name: Deploy Multi-Cloud API (AWS & Azure)

on:
  push:
    branches: [ main ]

jobs:
  # Job para AWS (Seu ambiente atual que já está OK)
  deploy-aws:
    name: Deploy to AWS EC2
    runs-on: self-hosted
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Build and Run on AWS
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          docker build -t checkvisit-api .
          docker stop checkvisit-container || true
          docker rm checkvisit-container || true
          docker run -d --name checkvisit-container --restart always -p 80:8080 -e ConnectionStrings__DefaultConnection="$DB_CONN" checkvisit-api

  # Job para Azure (Ajustado para evitar erros de diretório no Windows)
  deploy-azure:
    name: Deploy to Azure VM
    runs-on: azure-vm
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          clean: false # Evita que o PowerShell tente deletar pastas protegidas

      - name: Build and Run on Azure
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        shell: pwsh
        run: |
          # 1. Build da Imagem
          docker build -t checkvisit-api .
          
          # 2. Limpeza de containers antigos (Sintaxe PowerShell segura)
          $container = docker ps -a -q -f "name=checkvisit-container-azure"
          if ($container) { 
              docker stop checkvisit-container-azure
              docker rm checkvisit-container-azure 
          }
          
          # 3. Execução (Uso de ` para quebra de linha no Windows)
          docker run -d `
            --name checkvisit-container-azure `
            --restart always `
            -p 80:8080 `
            -e ConnectionStrings__DefaultConnection="$($env:DB_CONN)" `
            checkvisit-api
