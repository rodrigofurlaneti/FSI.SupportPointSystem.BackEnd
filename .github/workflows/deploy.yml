name: Deploy Multi-Cloud API (AWS & Azure)

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Deploy para AWS (EC2 Linux) - Seu ambiente principal
  deploy-aws:
    name: Deploy to AWS EC2
    runs-on: self-hosted 
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build and Run on AWS
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          # Build da imagem
          docker build -t checkvisit-api .
          
          # Limpeza (Sintaxe Bash/Linux)
          docker stop checkvisit-container || true
          docker rm checkvisit-container || true
          docker image prune -f
          
          # Execução - No Linux usamos $DB_CONN diretamente
          docker run -d \
            --name checkvisit-container \
            --restart always \
            -p 80:8080 \
            -e ConnectionStrings__DefaultConnection="$DB_CONN" \
            checkvisit-api

  # Job 2: Deploy para Azure (VM Windows) - Sua contingência em West US 2
  deploy-azure:
    name: Deploy to Azure VM
    runs-on: azure-vm
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build and Run on Azure
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        shell: pwsh
        run: |
          # Build da imagem
          docker build -t checkvisit-api .
          
          # Limpeza (Sintaxe PowerShell segura para Windows)
          $container = docker ps -a -q -f "name=checkvisit-container-azure"
          if ($container) { 
              docker stop checkvisit-container-azure
              docker rm checkvisit-container-azure 
          }
          docker image prune -f
          
          # Execução - No Windows usamos $env:DB_CONN
          docker run -d `
            --name checkvisit-container-azure `
            --restart always `
            -p 80:8080 `
            -e ConnectionStrings__DefaultConnection="$($env:DB_CONN)" `
            checkvisit-api
