name: Deploy Multi-Cloud API (AWS & Azure)

on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # JOB 1: AWS (Linux / Bash)
  # ==========================================
  deploy-aws:
    name: Deploy to AWS EC2
    runs-on: self-hosted
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build and Run on AWS
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          # Sintaxe nativa Bash para Linux
          docker build -t checkvisit-api .
          docker stop checkvisit-container || true
          docker rm checkvisit-container || true
          
          docker run -d \
            --name checkvisit-container \
            --restart always \
            -p 80:8080 \
            -e ConnectionStrings__DefaultConnection="$DB_CONN" \
            checkvisit-api

  # ==========================================
  # JOB 2: AZURE (Windows / PowerShell)
  # ==========================================
  deploy-azure:
    name: Deploy to Azure VM
    runs-on: azure-vm
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build and Run on Azure
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        # Forçamos o shell 'powershell' para evitar erro de 'pwsh' não encontrado
        shell: powershell
        run: |
          # 1. Build da Imagem
          docker build -t checkvisit-api .
          
          # 2. Limpeza robusta (Sintaxe segura para Windows)
          $container = docker ps -a -q -f "name=checkvisit-container-azure"
          if ($container) { 
              docker stop checkvisit-container-azure
              docker rm checkvisit-container-azure 
          }
          docker image prune -f
          
          # 3. Execução (Uso de ` para quebra de linha e $env: para variável)
          docker run -d `
            --name checkvisit-container-azure `
            --restart always `
            -p 80:8080 `
            -e ConnectionStrings__DefaultConnection="$($env:DB_CONN)" `
            checkvisit-api
