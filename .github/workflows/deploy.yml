name: Deploy Multi-Cloud API (AWS & Azure)

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Deploy para AWS (EC2 Linux - Runner: self-hosted)
  deploy-aws:
    name: Deploy to AWS EC2
    runs-on: self-hosted
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build and Run on AWS
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          # Build da imagem Docker
          docker build -t checkvisit-api .
          
          # Limpeza (Sintaxe Bash para Linux)
          docker stop checkvisit-container || true
          docker rm checkvisit-container || true
          docker image prune -f
          
          # Execução na AWS
          docker run -d \
            --name checkvisit-container \
            --restart always \
            -p 80:8080 \
            -e ConnectionStrings__DefaultConnection="$DB_CONN" \
            checkvisit-api

  # Job 2: Deploy para Azure (VM Windows - Runner: azure-vm)
  deploy-azure:
    name: Deploy to Azure VM
    runs-on: azure-vm
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          # Ajuda a evitar erros de caminhos longos no Windows
          persist-credentials: false

      - name: Build and Run on Azure
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        # Alterado para 'powershell' para usar o Windows PowerShell nativo da VM
        shell: powershell
        run: |
          # 1. Build da Imagem
          docker build -t checkvisit-api .
          
          # 2. Limpeza de containers antigos (Sintaxe PowerShell segura)
          $container = docker ps -a -q -f "name=checkvisit-container-azure"
          if ($container) { 
              docker stop checkvisit-container-azure
              docker rm checkvisit-container-azure 
          }
          docker image prune -f
          
          # 3. Execução no Azure (Injeção de variável $env:DB_CONN)
          docker run -d `
            --name checkvisit-container-azure `
            --restart always `
            -p 80:8080 `
            -e ConnectionStrings__DefaultConnection="$($env:DB_CONN)" `
            checkvisit-api
